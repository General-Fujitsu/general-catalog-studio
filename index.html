<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#06171b">
<title>GENERAL Katalog-Studio 2026/27</title>
<meta name="description" content="GENERAL / Fujitsu General – Katalog, Konfigurator & Angebotsassistent. Preisliste 2026/27, alle Preise netto.">
<style>
:root{
  --bg:#06171b; --bg2:#092025; --panel:#0c2429; --panel2:#103036; --sunk:#081b1f;
  --line:#1e434a; --line2:#2b565f;
  --ink:#e8f4f6; --frost:#dcf3f6; --muted:#8fb2b8; --dim:#5f838a;
  --brand:#327c89; --hi:#4fb3c4; --hi2:#7fd4e2;
  --amber:#ffb454; --red:#ff7b79; --ok:#7fd98f;
  --r:18px; --r2:12px;
  --mono:"SF Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --disp:"Avenir Next Condensed","AvenirNextCondensed-DemiBold","Arial Narrow",Futura,-apple-system,sans-serif;
  --body:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--body);color:var(--ink);background:
  radial-gradient(1200px 500px at 85% -10%,rgba(79,179,196,.13),transparent 60%),
  radial-gradient(900px 600px at -10% 110%,rgba(50,124,137,.10),transparent 55%),
  linear-gradient(160deg,var(--bg) 0%,#081d22 55%,#051215 100%);
  min-height:100vh;font-size:15px;line-height:1.45;}
button,input,select,textarea{font:inherit;color:inherit}
.hidden{display:none!important}
a{color:var(--hi)}

/* ---------- Topbar ---------- */
.topbar{position:sticky;top:0;z-index:80;display:flex;align-items:center;gap:14px;
  padding:10px 16px calc(10px);background:rgba(6,23,27,.86);
  -webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(79,179,196,.16)}
.brand{display:flex;flex-direction:column;line-height:1.05;min-width:0}
.brand .g{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:.16em;color:#fff}
.brand .g em{font-style:normal;color:var(--hi)}
.brand small{color:var(--muted);font-size:10px;letter-spacing:.22em;text-transform:uppercase;margin-top:2px;white-space:nowrap}
.top-meta{margin-left:auto;text-align:right;color:var(--dim);font-size:11px;line-height:1.3;display:none}
.cart-btn{display:flex;align-items:center;gap:8px;border:1px solid var(--line2);
  background:linear-gradient(135deg,var(--brand),#20565f);color:#fff;border-radius:14px;
  padding:9px 13px;cursor:pointer;font-weight:600;box-shadow:0 8px 24px rgba(50,124,137,.35)}
.cart-btn .n{display:inline-grid;place-items:center;min-width:21px;height:21px;padding:0 6px;
  border-radius:999px;background:#fff;color:#0a2b31;font-size:12px;font-weight:800;font-family:var(--mono)}
.cart-btn .n.pulse{animation:pulse .5s ease}
@keyframes pulse{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}

/* ---------- Nav ---------- */
.nav{display:flex;gap:6px;overflow-x:auto;padding:10px 14px;position:sticky;top:57px;z-index:70;
  background:rgba(6,23,27,.82);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.05);scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{flex:0 0 auto;border:1px solid transparent;background:transparent;color:var(--muted);
  padding:8px 13px;border-radius:11px;cursor:pointer;white-space:nowrap;font-weight:600;font-size:13.5px;
  letter-spacing:.02em;transition:background .2s,color .2s,border-color .2s}
.nav button.active{color:#fff;background:var(--panel2);border-color:var(--line2)}
.nav button:hover{color:#fff}

/* ---------- Cockpit ---------- */
.cockpit{padding:20px 16px 8px;max-width:1180px;margin:0 auto}
.cockpit h1{margin:0;font-family:var(--disp);font-weight:700;font-size:30px;letter-spacing:.04em;line-height:1.06}
.cockpit h1 span{color:var(--hi)}
.cockpit .sub{color:var(--muted);font-size:13px;margin-top:6px}
.cockpit .sub b{color:var(--frost);font-weight:600}

/* ---------- Layout ---------- */
.wrap{max-width:1180px;margin:0 auto;padding:12px 16px 110px}
.section-title{font-family:var(--disp);font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  font-size:13px;color:var(--hi);margin:22px 2px 10px;display:flex;align-items:center;gap:10px}
.section-title:after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:12px}
.chips{display:flex;gap:7px;overflow-x:auto;padding:4px 2px 10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line);background:var(--sunk);color:var(--muted);
  padding:7px 12px;border-radius:999px;cursor:pointer;font-size:12.5px;font-weight:600;white-space:nowrap}
.chip.active{color:#04262c;background:var(--hi);border-color:var(--hi)}

/* ---------- Cards ---------- */
.card{background:linear-gradient(175deg,var(--panel) 0%,var(--sunk) 100%);border:1px solid var(--line);
  border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden}
.card:before{content:"";position:absolute;inset:0 0 auto 0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(79,179,196,.55),transparent);opacity:0;transition:opacity .25s}
.card:hover:before{opacity:1}
.card .head{display:flex;gap:10px;align-items:flex-start}
.sil{flex:0 0 58px;height:46px;color:var(--hi);opacity:.9}
.sil svg{width:100%;height:100%;display:block}
.card .tt{min-width:0}
.card .series{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700}
.card .model{font-weight:700;font-size:15.5px;color:#fff;margin-top:2px;line-height:1.2}
.card .model small{color:var(--muted);font-weight:500}
.specs{display:flex;flex-wrap:wrap;gap:5px 12px;font-size:12.5px;color:var(--muted)}
.specs b{color:var(--frost);font-weight:600}
.artline{display:flex;align-items:baseline;justify-content:space-between;gap:8px;
  border-top:1px dashed var(--line);padding-top:9px;margin-top:auto}
.art{font-family:var(--mono);font-size:13px;color:var(--hi2);letter-spacing:.03em}
.price{font-family:var(--mono);font-weight:700;font-size:16px;color:#fff}
.price small{color:var(--muted);font-weight:400;font-size:11px}
.cta-row{display:flex;gap:8px}
.btn{border:1px solid var(--line2);background:var(--panel2);color:var(--frost);border-radius:11px;
  padding:9px 12px;cursor:pointer;font-weight:600;font-size:13.5px;transition:background .15s}
.btn:hover{background:#154047}
.btn.primary{background:linear-gradient(135deg,var(--hi),var(--brand));border-color:transparent;color:#03252b}
.btn.primary:hover{filter:brightness(1.07)}
.btn.ghost{background:transparent}
.btn.small{padding:6px 10px;font-size:12.5px;border-radius:9px}
.btn.danger{color:var(--red);border-color:rgba(255,123,121,.4)}
.btn:disabled{opacity:.4;cursor:default}
.badge{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:3px 8px;border-radius:999px;background:rgba(79,179,196,.14);color:var(--hi2);border:1px solid rgba(79,179,196,.3)}
.badge.color{background:rgba(255,180,84,.12);color:var(--amber);border-color:rgba(255,180,84,.3)}

/* ---------- Prüfleiste (Signatur) ---------- */
.check{position:sticky;bottom:0;z-index:60;margin:14px -16px -110px;padding:12px 16px 14px;
  background:rgba(6,23,27,.94);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
  border-top:1px solid var(--line2)}
.check-inner{max-width:1180px;margin:0 auto}
.gauges{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px}
.gauge label{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);
  letter-spacing:.05em;text-transform:uppercase;font-weight:700;margin-bottom:4px}
.gauge label b{font-family:var(--mono);color:var(--frost);text-transform:none;letter-spacing:0}
.track{position:relative;height:10px;border-radius:6px;background:var(--sunk);border:1px solid var(--line);overflow:hidden}
.band{position:absolute;top:0;bottom:0;background:rgba(127,217,143,.16);border-left:1px solid rgba(127,217,143,.5);border-right:1px solid rgba(127,217,143,.5)}
.fill{position:absolute;top:0;bottom:0;left:0;background:linear-gradient(90deg,var(--brand),var(--hi));transition:width .35s ease,background .25s}
.fill.warn{background:linear-gradient(90deg,#b97b28,var(--amber))}
.fill.bad{background:linear-gradient(90deg,#a33,var(--red))}
.check .verdict{margin-top:9px;font-size:13px;font-weight:600}
.verdict.ok{color:var(--ok)} .verdict.warn{color:var(--amber)} .verdict.bad{color:var(--red)}
.warnbox{border:1px solid rgba(255,180,84,.45);background:rgba(255,180,84,.08);color:var(--amber);
  border-radius:var(--r2);padding:10px 12px;font-size:13px;font-weight:600;margin:8px 0}
.warnbox.bad{border-color:rgba(255,123,121,.5);background:rgba(255,123,121,.08);color:var(--red)}
.okbox{border:1px solid rgba(127,217,143,.4);background:rgba(127,217,143,.07);color:var(--ok);
  border-radius:var(--r2);padding:10px 12px;font-size:13px;font-weight:600;margin:8px 0}

/* ---------- Stepper / Picker ---------- */
.pickrow{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--line);
  border-radius:var(--r2);background:var(--sunk);margin-bottom:7px}
.pickrow .info{min-width:0;flex:1}
.pickrow .m{font-weight:700;font-size:14px;color:#fff}
.pickrow .s{font-size:12px;color:var(--muted)}
.pickrow .s .art{font-size:11.5px}
.stepper{display:flex;align-items:center;gap:2px;flex:0 0 auto}
.stepper button{width:34px;height:34px;border-radius:10px;border:1px solid var(--line2);background:var(--panel2);
  color:var(--frost);font-size:18px;font-weight:700;cursor:pointer;line-height:1}
.stepper .q{width:34px;text-align:center;font-family:var(--mono);font-weight:700;font-size:15px;color:#fff}
.stepper .q.on{color:var(--hi2)}

/* ---------- Sheet / Modal ---------- */
.sheet-back{position:fixed;inset:0;background:rgba(3,10,12,.66);z-index:100;
  -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:101;max-height:86vh;overflow:auto;
  background:linear-gradient(180deg,var(--panel2),var(--panel));border-radius:22px 22px 0 0;
  border:1px solid var(--line2);border-bottom:0;padding:18px 16px calc(22px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling:touch;animation:up .28s ease}
@keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:none;opacity:1}}
@media(min-width:760px){.sheet{left:50%;right:auto;width:640px;transform:translateX(-50%);bottom:4vh;border-radius:22px;border-bottom:1px solid var(--line2)}
  @keyframes up{from{transform:translate(-50%,30px);opacity:.5}to{transform:translate(-50%,0);opacity:1}}}
.sheet h3{margin:0 0 4px;font-family:var(--disp);letter-spacing:.05em;font-size:19px}
.sheet .sub{color:var(--muted);font-size:12.5px;margin-bottom:12px}
.sug{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px dashed var(--line)}
.sug:last-of-type{border-bottom:0}
.sug input[type=checkbox]{width:20px;height:20px;accent-color:#4fb3c4;flex:0 0 auto}
.sug .info{flex:1;min-width:0}
.sug .n{font-size:13.5px;font-weight:600;color:var(--frost)}
.sug .d{font-size:12px;color:var(--muted)}
.sheet .foot{display:flex;gap:8px;margin-top:14px}
.sheet .foot .btn{flex:1;padding:12px}

/* ---------- Inputs ---------- */
.field{margin-bottom:10px}
.field label{display:block;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:4px}
.input, textarea.input, select.input{width:100%;border:1px solid var(--line);background:var(--sunk);color:#fff;
  border-radius:var(--r2);padding:10px 12px;font-size:15px;-webkit-appearance:none;appearance:none}
.input:focus{outline:2px solid rgba(79,179,196,.5);outline-offset:1px;border-color:var(--hi)}
textarea.input{min-height:130px;resize:vertical;line-height:1.5}
select.input{background-image:linear-gradient(45deg,transparent 50%,var(--hi) 50%),linear-gradient(135deg,var(--hi) 50%,transparent 50%);
  background-position:calc(100% - 18px) 50%,calc(100% - 13px) 50%;background-size:5px 5px;background-repeat:no-repeat;padding-right:34px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ---------- Cart / Output ---------- */
.cartline{display:flex;align-items:center;gap:9px;padding:10px 2px;border-bottom:1px dashed var(--line)}
.cartline .info{flex:1;min-width:0}
.cartline .n{font-size:13.5px;font-weight:600;color:var(--frost);line-height:1.3}
.cartline .a{font-family:var(--mono);font-size:12px;color:var(--hi2)}
.cartline .p{font-family:var(--mono);font-size:13px;color:var(--muted);white-space:nowrap}
.cartline .x{border:0;background:transparent;color:var(--red);font-size:17px;cursor:pointer;padding:4px 6px}
.mode-tabs{display:flex;gap:6px;margin:8px 0 12px}
.mode-tabs button{flex:1;border:1px solid var(--line);background:var(--sunk);color:var(--muted);
  border-radius:11px;padding:10px 6px;font-weight:700;font-size:13px;cursor:pointer}
.mode-tabs button.active{background:var(--panel2);color:#fff;border-color:var(--hi);box-shadow:inset 0 0 0 1px rgba(79,179,196,.4)}
pre.out{white-space:pre-wrap;word-wrap:break-word;background:#041114;border:1px solid var(--line);
  border-radius:var(--r);padding:14px;font-family:var(--mono);font-size:12.5px;line-height:1.55;color:#d9edf0;
  max-height:420px;overflow:auto;margin:0}
.sumline{display:flex;justify-content:space-between;font-family:var(--mono);font-size:13.5px;padding:3px 2px;color:var(--muted)}
.sumline.total{color:#fff;font-weight:700;font-size:15px;border-top:1px solid var(--line2);margin-top:6px;padding-top:8px}

.empty{color:var(--dim);text-align:center;padding:34px 10px;font-size:14px}
.pill-note{font-size:11.5px;color:var(--dim);margin-top:4px}
.copyok{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--ok);color:#052b12;
  font-weight:700;padding:10px 18px;border-radius:999px;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.detail-table{width:100%;border-collapse:collapse;font-size:13px}
.detail-table td{padding:6px 4px;border-bottom:1px dashed var(--line);vertical-align:top}
.detail-table td:first-child{color:var(--muted);white-space:nowrap;padding-right:12px}
.detail-table td:last-child{color:var(--frost)}

@media(min-width:900px){
  .top-meta{display:block}
  .cockpit h1{font-size:36px}
  .gauges{grid-template-columns:1fr 1fr 1fr}
}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>

  };
  function silFor(cat) {
    if (cat === 'Wandmodelle') return SIL.wall;

    if (cat === 'Deckenmodelle') return SIL.decke;
    if (cat === 'Zwischendeckenmodelle') return SIL.duct;
    return SIL.wall;
  }
  function silForSeries(s) {
    if (s.indexOf('Kassette') >= 0) return SIL.cassette;
    if (s.indexOf('Truhe') >= 0) return SIL.truhe;
    if (s.indexOf('Zwischendeck') >= 0) return SIL.duct;
    if (s.indexOf('Decke') >= 0) return SIL.decke;

  }

  /* ---------- Nachschlagewerke ---------- */
  var accByArt = {};
  var i;
  for (i = 0; i < D.acc.length; i++) accByArt[D.acc[i].art] = D.acc[i];
  for (i = 0; i < D.browse.length; i++) if (!accByArt[D.browse[i].art]) accByArt[D.browse[i].art] = D.browse[i];
  function accName(art, fb) { return accByArt[art] ? accByArt[art].name : (fb || 'Zubehör'); }

  var lineByDia = {};
  for (i = 0; i < D.acc.length; i++) if (D.acc[i].dia) lineByDia[D.acc[i].dia] = D.acc[i];
  function linesForPipe(pipe) { /* "6,35/12,70" -> [flüssig, saug] */
    if (!pipe) return [];
    var parts = pipe.split('/'), out = [], j, d;
    for (j = 0; j < parts.length; j++) {
      d = parts[j].replace(/\s/g, '').replace('12,7', '12,70').replace('19,0', '19,05');
      if (d === '15,85') d = '15,88';
      if (d === '22,22' || d === '28,58') d = '22,00';
      if (lineByDia[d]) out.push(lineByDia[d]);
    }
    return out;
  }

    if (kw !== null && kw >= 12) return accByArt['2558871'];

  /* Zubehör-Sheet für ein Single-Set */

  /* ---------- MULTI-SPLIT ---------- */
  function multiSums() {
    var idx = 0, kw = 0, n = 0, j, m;
    for (j = 0; j < D.multiIn.length; j++) {
      m = D.multiIn[j];
      var q = state.multi[m.id] || 0;
      if (q > 0) { idx += m.index * q; kw += (m.kw || 0) * q; n += q; }
    }
    return { idx: idx, kw: Math.round(kw * 10) / 10, n: n };
  }
  function fittingOutdoors(sums) {
    var out = [], j, o;
    for (j = 0; j < D.multiOut.length; j++) {
      o = D.multiOut[j];
      var fit = sums.n >= o.minU && sums.n <= o.maxU &&
                sums.idx >= o.idxMin && sums.idx <= o.idxMax &&
                sums.kw >= o.kwMin && sums.kw <= o.kwMax;
      out.push({ o: o, fit: fit });
    }
    return out;
  }

      groups[m.series].push(m);

      for (j = 0; j < list.length; j++) {

        html += '<div class="pickrow"><div class="info">' +
          '<div class="m">' + esc(m.model) + ' <span class="badge">Index ' + m.index + '</span></div>' +

          (m.modelAlt ? ' · Variante: ' + esc(m.modelAlt) + ' <span class="art">' + esc(m.artAlt || '') + '</span>' : '') + '</div></div>' +
          '<div class="stepper"><button type="button" data-mm="' + m.id + '">−</button><span class="q' + (q > 0 ? ' on' : '') + '">' + q + '</span><button type="button" data-mp="' + m.id + '">+</button></div></div>';
      }

    }

    /* Außeneinheiten */
    html += '<div class="section-title">2 · Passende Außeneinheit</div>';
    var fits = fittingOutdoors(sums), anyFit = false;
    html += '<div class="grid">';
    for (j = 0; j < fits.length; j++) {
      var o = fits[j].o, fit = fits[j].fit;
      if (fit) anyFit = true;
      html += '<div class="card" style="' + (fit ? 'border-color:rgba(127,217,143,.55)' : 'opacity:.62') + '">' +
        '<div class="head"><div class="sil">' + SIL.outdoor + '</div><div class="tt">' +
        '<div class="series">' + esc(o.label) + '</div><div class="model">' + esc(o.model) + '</div></div></div>' +
        '<div class="specs"><span>Index <b>' + o.idxMin + '–' + o.idxMax + '</b></span>' +
        '<span>kW <b>' + String(o.kwMin).replace('.', ',') + '–' + String(o.kwMax).replace('.', ',') + '</b></span>' +
        '<span>IE <b>' + o.minU + '–' + o.maxU + '</b></span>' +
        '<span>Aufnahme <b>' + fmtW(o.watt) + '</b></span></div>' +
        '<div class="artline"><span class="art">' + esc(o.art) + '</span><span class="price">' + fmtEurList(o.price) + '</span></div>' +
        '<button class="btn ' + (fit ? 'primary' : '') + '" data-msys="' + o.id + '"' + (sums.n === 0 ? ' disabled' : '') + '>' +
        (fit ? 'System übernehmen' : 'Außerhalb des Bereichs') + '</button></div>';
    }
    html += '</div>';

    /* Warnungen */
    if (sums.n > 0 && !anyFit) {
      html += '<div class="warnbox bad">⚠ Achtung: Für diese Kombination (Indexsumme ' + sums.idx + ', ' + fmtKw(sums.kw) + ', ' + sums.n + ' Inneneinheiten) passt keine Multi-Außeneinheit. Bitte Kombination anpassen – Grenzwerte siehe Karten oben (Katalog S. 94/95).</div>';
    }

    /* Prüfleiste */
    html += renderCheckBar(sums, anyFit);
    $('view').innerHTML = html;

    var v = $('view');
    var mm = v.querySelectorAll('[data-mm]');
    for (j = 0; j < mm.length; j++) mm[j].onclick = function () { stepMulti(this.getAttribute('data-mm'), -1); };
    var mp = v.querySelectorAll('[data-mp]');
    for (j = 0; j < mp.length; j++) mp[j].onclick = function () { stepMulti(this.getAttribute('data-mp'), 1); };
    var ms = v.querySelectorAll('[data-msys]');
    for (j = 0; j < ms.length; j++) ms[j].onclick = function () { addMultiSystem(this.getAttribute('data-msys')); };
  }
  function hasQty(list) { var j; for (j = 0; j < list.length; j++) if ((state.multi[list[j].id] || 0) > 0) return true; return false; }
  function stepMulti(id, d) {
    var q = (state.multi[id] || 0) + d;
    if (q < 0) q = 0; if (q > 5) q = 5;
    state.multi[id] = q; store.set('multi', state.multi);
    render();
  }
  function renderCheckBar(sums, anyFit) {
    /* Bänder über alle Outdoors: min idx 14, max 54; kw 4.0–15.8 */
    var idxMax = 60, kwMax = 18;
    var cls = sums.n === 0 ? '' : (anyFit ? '' : 'bad');
    var verdict, vcls;
    if (sums.n === 0) { verdict = 'Noch keine Inneneinheiten gewählt.'; vcls = ''; }
    else if (anyFit) { verdict = '✓ Kombination zulässig – passende Außeneinheiten sind grün markiert.'; vcls = 'ok'; }
    else { verdict = '⚠ Indexsumme oder kW-Last außerhalb aller zulässigen Bereiche!'; vcls = 'bad'; }
    return '<div class="check"><div class="check-inner"><div class="gauges">' +
      gauge('Indexsumme', sums.idx, idxMax, 14, 54, cls) +
      gauge('Kühlleistung', sums.kw, kwMax, 4, 15.8, cls, ' kW') +
      gauge('Inneneinheiten', sums.n, 6, 2, 5, cls) +
      '</div><div class="verdict ' + vcls + '">' + verdict + '</div></div></div>';
  }
  function gauge(label, val, max, bandLo, bandHi, cls, unit) {
    var pct = Math.min(100, val / max * 100);
    var lo = bandLo / max * 100, hi = bandHi / max * 100;
    return '<div class="gauge"><label>' + label + '<b>' + String(val).replace('.', ',') + (unit || '') + '</b></label>' +
      '<div class="track"><div class="band" style="left:' + lo + '%;width:' + (hi - lo) + '%"></div>' +
      '<div class="fill ' + cls + '" style="width:' + pct + '%"></div></div></div>';
  }
  function addMultiSystem(outId) {
    var o = null, j;
    for (j = 0; j < D.multiOut.length; j++) if (D.multiOut[j].id === outId) o = D.multiOut[j];
    if (!o) return;
    var sums = multiSums();
    var fit = sums.n >= o.minU && sums.n <= o.maxU && sums.idx >= o.idxMin && sums.idx <= o.idxMax && sums.kw >= o.kwMin && sums.kw <= o.kwMax;
    var loadPct = Math.round(sums.kw / o.kw * 100);
    var sub = 'Indexsumme ' + sums.idx + ' (zulässig ' + o.idxMin + '–' + o.idxMax + ') · ' + fmtKw(sums.kw) +
      ' (zulässig ' + String(o.kwMin).replace('.', ',') + '–' + String(o.kwMax).replace('.', ',') + ' kW) · Auslastung ' + loadPct + ' % der Nennkühlleistung';
    if (!fit) sub = '⚠ ACHTUNG: Grenzwerte überschritten! ' + sub;

    var sugs = [];
    /* Innengeräte als Vorschläge (fix an) */
    for (j = 0; j < D.multiIn.length; j++) {
      var m = D.multiIn[j], q = state.multi[m.id] || 0;
      if (q > 0) sugs.push({ art: m.art, name: 'Inneneinheit ' + m.model + ' – ' + m.series + ' (' + fmtKw(m.kw) + ')', price: m.price, qty: q, on: true, why: 'Index ' + m.index });
    }
    if (o.wanne) sugs.push({ art: o.wanne, name: accName(o.wanne), price: accPrice(o.wanne), qty: 1, on: true, why: 'Laut Katalog passend' });
    if (o.reps) sugs.push({ art: o.reps, name: accName(o.reps), price: accPrice(o.reps), qty: 1, on: true, why: 'Laut Katalog passend' });
    /* Leitungen: je IE ein Paar nach IE-Rohrmaß */
    var lineCount = {};
    for (j = 0; j < D.multiIn.length; j++) {
      var m2 = D.multiIn[j], q2 = state.multi[m2.id] || 0;
      if (q2 > 0) {
        var ls = linesForPipe(m2.pipe), k;
        for (k = 0; k < ls.length; k++) lineCount[ls[k].art] = (lineCount[ls[k].art] || 0) + q2;
      }
    }
    var art;
    for (art in lineCount) {
      if (lineCount.hasOwnProperty(art)) {
        sugs.push({ art: art, name: accName(art), price: accPrice(art), qty: 1, on: false, why: 'Für ' + lineCount[art] + ' Strecke(n) à 25-m-Ring' });
      }
    }
    var so = sockelFor(o.kw, 230);
    if (so) sugs.push({ art: so.art, name: so.name, price: so.price, qty: 2, on: false, why: 'Bodenaufstellung (2 Stück)' });
    openSuggestSheet('Multi-System übernehmen', sub,
      { art: o.art, name: 'Außeneinheit ' + o.model + ' – ' + o.label + ' Multi-Split', price: o.price, qty: 1 }, sugs);
  }

  /* ---------- SIMULTAN ---------- */
  function simById(id) { var j; for (j = 0; j < D.simOut.length; j++) if (D.simOut[j].id === id) return D.simOut[j]; return null; }
  function simInById(id) { var j; for (j = 0; j < D.simIn.length; j++) if (D.simIn[j].id === id) return D.simIn[j]; return null; }
  function renderSim() {
    var html = '<div class="section-title">1 · Außeneinheit wählen</div><div class="chips">';
    var j;
    for (j = 0; j < D.simOut.length; j++) {
      var o = D.simOut[j];
      html += '<button class="chip ' + (state.simOutId === o.id ? 'active' : '') + '" data-so="' + o.id + '">' +
        esc(o.model) + ' · ' + o.volt + ' V</button>';
    }
    html += '</div>';
    var sel = state.simOutId ? simById(state.simOutId) : null;
    if (sel) {
      html += '<div class="card" style="margin-bottom:14px"><div class="head"><div class="sil">' + SIL.outdoor + '</div><div class="tt">' +
        '<div class="series">Simultan-Außeneinheit · max. ' + sel.maxIE + ' Inneneinheiten</div>' +
        '<div class="model">' + esc(sel.model) + ' <small>' + sel.volt + ' V</small></div></div></div>' +
        '<div class="specs"><span>Nennkühlleistung <b>' + fmtKw(sel.kw) + '</b></span>' +
        '<span>Leistungsaufnahme <b>' + fmtW(sel.watt) + '</b></span>' +
        '<span>Ø <b>' + esc(sel.pipe) + ' mm</b></span></div>' +

      html += '<div class="section-title">2 · Zulässige Kombination wählen</div><div class="grid">';
      var cs = simCombosFor(sel.id);
      for (j = 0; j < cs.length; j++) {
        var c = cs[j], ie = simInById(c.ie);
        var vert = simVerteiler(sel, c.n);
        var sum = sel.price + ie.price * c.n + (vert ? vert.price : 0);
        html += '<div class="card"><div class="head"><div class="sil">' + silForSeries(ie.series) + '</div><div class="tt">' +
          '<div class="series">' + esc(ie.series) + '</div>' +
          '<div class="model">' + c.n + ' × ' + esc(ie.model) + '</div></div></div>' +
          '<div class="specs"><span>IE gesamt <b>' + fmtKw(Math.round(ie.kw * c.n * 10) / 10) + '</b></span>' +
          '<span>je IE <b>' + fmtEurList(ie.price) + '</b></span>' +
          (vert ? '<span>Verteiler <b>' + esc(vert.art) + '</b></span>' : '') + '</div>' +
          '<div class="artline"><span class="art">' + esc(ie.art) + '</span><span class="price">' + fmtEurList(sum) + ' <small>System</small></span></div>' +
          '<button class="btn primary" data-simadd="' + c.ie + '|' + c.n + '">System übernehmen</button></div>';
      }
      html += '</div>';
    } else {
      html += '<div class="empty">Außeneinheit wählen – dann zeigen wir nur die im Katalog zugelassenen Kombinationen.</div>';
    }
    $('view').innerHTML = html;
    var chips = $('view').querySelectorAll('[data-so]');
    for (j = 0; j < chips.length; j++) chips[j].onclick = function () { state.simOutId = this.getAttribute('data-so'); render(); };
    var adds = $('view').querySelectorAll('[data-simadd]');
    for (j = 0; j < adds.length; j++) adds[j].onclick = function () {
      var p = this.getAttribute('data-simadd').split('|');
      addSimSystem(state.simOutId, p[0], parseInt(p[1], 10));
    };
  }
  function simCombosFor(outId) {
    var res = [], j, k;
    for (j = 0; j < D.simCombos.length; j++) {
      var grp = D.simCombos[j];
      var hit = false;
      for (k = 0; k < grp.out.length; k++) if (grp.out[k] === outId) hit = true;
      if (hit) for (k = 0; k < grp.combos.length; k++) res.push(grp.combos[k]);
    }
    return res;
  }
  function simVerteiler(o, n) {
    var art = null, price = null;
    if (n === 2) { art = o.vert2; price = o.vert2Price; }
    if (n === 3) { art = o.vert3; price = o.vert3Price; }
    if (n === 4) { art = o.vert4; price = o.vert4Price; }
    if (!art) return null;
    return { art: art, price: price, name: accName(art, 'Verteiler für ' + n + ' Inneneinheiten') };
  }
  function addSimSystem(outId, ieId, n) {
    var o = simById(outId), ie = simInById(ieId);
    if (!o || !ie) return;
    var vert = simVerteiler(o, n);
    var sugs = [];
    sugs.push({ art: ie.art, name: 'Inneneinheit ' + ie.model + ' – ' + ie.series + ' (' + fmtKw(ie.kw) + ')', price: ie.price, qty: n, on: true, why: 'Simultan-Kombination' });
    if (vert) sugs.push({ art: vert.art, name: vert.name, price: vert.price, qty: 1, on: true, why: 'Pflicht bei ' + n + ' Inneneinheiten' });
    if (o.wanne) sugs.push({ art: o.wanne, name: accName(o.wanne), price: accPrice(o.wanne), qty: 1, on: true, why: 'Laut Katalog passend' });
    if (o.reps) sugs.push({ art: o.reps, name: accName(o.reps), price: accPrice(o.reps), qty: 1, on: true, why: 'Laut Katalog passend' });
    var ls = linesForPipe(o.pipe), j;
    for (j = 0; j < ls.length; j++) sugs.push({ art: ls[j].art, name: ls[j].name, price: ls[j].price, qty: 1, on: false, why: 'Hauptstrecke Ø ' + o.pipe + ' mm' });
    var so = sockelFor(o.kw, o.volt);
    if (so) sugs.push({ art: so.art, name: so.name, price: so.price, qty: 2, on: false, why: 'Bodenaufstellung (2 Stück)' });
    var alt = ie.artAlt ? ' · Variante ' + ie.altNote + ': ' + ie.artAlt : '';
    openSuggestSheet('Simultan-System übernehmen',
      n + ' × ' + esc(ie.model) + ' an ' + esc(o.model) + ' (' + o.volt + ' V)' + esc(alt),
      { art: o.art, name: 'Außeneinheit ' + o.model + ' – Simultan Multi (' + fmtKw(o.kw) + ', ' + o.volt + ' V)', price: o.price, qty: 1 }, sugs);
  }

  /* ---------- VRF ---------- */
  function vrfOutById(art) { var j; for (j = 0; j < D.vrfOut.length; j++) if (D.vrfOut[j].art === art) return D.vrfOut[j]; return null; }
  function renderVrf() {
    var html = '<div class="chips">' +
      '<button class="chip ' + (state.vrfGen === 'J-V R32' ? 'active' : '') + '" data-vg="J-V R32">J-V · R32</button>' +
      '<button class="chip ' + (state.vrfGen === 'J-IV R410A' ? 'active' : '') + '" data-vg="J-IV R410A">J-IV / V-IV · R410A</button>' +
      '</div>';
    var wantR32 = state.vrfGen === 'J-V R32';

    html += '<div class="section-title">1 · Außeneinheit</div>';
    var groups = {}, order = [], j, o;
    for (j = 0; j < D.vrfOut.length; j++) {
      o = D.vrfOut[j];
      var isR32 = o.ref === 'R32';
      if (isR32 !== wantR32) continue;
      if (!groups[o.series]) { groups[o.series] = []; order.push(o.series); }
      groups[o.series].push(o);
    }
    var g;
    for (g = 0; g < order.length; g++) {
      html += '<div class="section-title" style="margin-top:14px;font-size:11.5px;color:var(--muted)">' + esc(order[g]) + '</div><div class="chips">';
      var list = groups[order[g]];
      for (j = 0; j < list.length; j++) {
        o = list[j];
        html += '<button class="chip ' + (state.vrfOutId === o.art ? 'active' : '') + '" data-vo="' + o.art + '">' +
          esc(o.model) + ' · ' + fmtKw(o.kw) + '</button>';
      }
      html += '</div>';
    }

    var sel = state.vrfOutId ? vrfOutById(state.vrfOutId) : null;
    var sums = vrfSums();
    if (sel) {
      html += '<div class="card" style="margin:8px 0 14px"><div class="head"><div class="sil">' + SIL.vrf + '</div><div class="tt">' +
        '<div class="series">' + esc(sel.series) + ' · ' + esc(sel.ref) + '</div>' +
        '<div class="model">' + esc(sel.model) + '</div></div></div>' +
        '<div class="specs"><span>Nennkühlleistung <b>' + fmtKw(sel.kw) + '</b></span>' +
        (sel.maxIE ? '<span>Inneneinheiten <b>' + sel.minIE + '–' + sel.maxIE + '</b></span>' : '') +
        (sel.wattKW ? '<span>Aufnahme <b>' + String(sel.wattKW).replace('.', ',') + ' kW</b></span>' : '') +
        (sel.pipe ? '<span>Ø <b>' + esc(sel.pipe) + ' mm</b></span>' : '') + '</div>' +
        '<div class="artline"><span class="art">' + esc(sel.art) + '</span><span class="price">' + fmtEurList(sel.price) + '</span></div></div>';

      html += '<div class="section-title">2 · Inneneinheiten</div>';
      var ig = {}, iorder = [], m;
      for (j = 0; j < D.vrfIn.length; j++) {
        m = D.vrfIn[j];
        if ((m.gen === 'J-V R32') !== wantR32) continue;
        if (!ig[m.series]) { ig[m.series] = []; iorder.push(m.series); }
        ig[m.series].push(m);
      }
      for (g = 0; g < iorder.length; g++) {
        var ser = iorder[g], il = ig[ser];
        html += '<details' + (vrfHasQty(il) ? ' open' : '') + ' style="margin-bottom:8px"><summary style="cursor:pointer;padding:10px 12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;font-weight:700;display:flex;align-items:center;gap:10px"><span class="sil" style="flex:0 0 34px;height:26px">' + silForSeries(ser) + '</span>' + esc(ser) + '<span style="margin-left:auto;color:var(--dim);font-weight:400;font-size:12px">S. ' + il[0].page + '</span></summary><div style="padding:8px 0 2px">';
        for (j = 0; j < il.length; j++) {
          m = il[j];
          var q = state.vrfSel[m.art] || 0;
          html += '<div class="pickrow"><div class="info">' +
            '<div class="m">' + esc(m.model) + '</div>' +
            '<div class="s"><span class="art">' + esc(m.art) + '</span> · ' + fmtKw(m.kw) + ' · ' + fmtEurList(m.price) + '</div></div>' +
            '<div class="stepper"><button type="button" data-vm="' + m.art + '">−</button><span class="q' + (q > 0 ? ' on' : '') + '">' + q + '</span><button type="button" data-vp="' + m.art + '">+</button></div></div>';
        }
        html += '</div></details>';
      }

      /* Pflichtzubehör-Hinweis + System-CTA */
      html += '<div class="okbox">Beim Übernehmen werden automatisch vorgeschlagen: <b>Verteiler, Umweltschutzwanne, Reparaturschalter und Bus-Kabel UTY-WMBUS</b> – Pflichtzubehör für jedes VRF-System.</div>';
      html += '<button class="btn primary" id="vrfAdd" style="width:100%;padding:13px"' + (sums.n === 0 ? ' disabled' : '') + '>VRF-System übernehmen (' + sums.n + ' IE · ' + fmtKw(sums.kw) + ')</button>';

      html += renderVrfCheck(sel, sums);
    } else {
      html += '<div class="empty">Außeneinheit wählen, dann Inneneinheiten zusammenstellen. Auslastung 50–130 % wird live geprüft.</div>';
    }
    $('view').innerHTML = html;

    var v = $('view');
    var vg = v.querySelectorAll('[data-vg]');
    for (j = 0; j < vg.length; j++) vg[j].onclick = function () { state.vrfGen = this.getAttribute('data-vg'); state.vrfOutId = null; render(); };
    var vo = v.querySelectorAll('[data-vo]');
    for (j = 0; j < vo.length; j++) vo[j].onclick = function () { state.vrfOutId = this.getAttribute('data-vo'); render(); };
    var vm = v.querySelectorAll('[data-vm]');
    for (j = 0; j < vm.length; j++) vm[j].onclick = function () { stepVrf(this.getAttribute('data-vm'), -1); };
    var vp = v.querySelectorAll('[data-vp]');
    for (j = 0; j < vp.length; j++) vp[j].onclick = function () { stepVrf(this.getAttribute('data-vp'), 1); };
    if ($('vrfAdd')) $('vrfAdd').onclick = addVrfSystem;
  }
  function vrfHasQty(list) { var j; for (j = 0; j < list.length; j++) if ((state.vrfSel[list[j].art] || 0) > 0) return true; return false; }
  function stepVrf(art, d) {
    var q = (state.vrfSel[art] || 0) + d;
    if (q < 0) q = 0; if (q > 40) q = 40;
    state.vrfSel[art] = q;
    render();
  }
  function vrfSums() {
    var kw = 0, n = 0, j, m;
    for (j = 0; j < D.vrfIn.length; j++) {
      m = D.vrfIn[j];
      var q = state.vrfSel[m.art] || 0;
      if (q > 0) { kw += (m.kw || 0) * q; n += q; }
    }
    return { kw: Math.round(kw * 10) / 10, n: n };
  }
  function renderVrfCheck(sel, sums) {
    var loadPct = sel.kw ? Math.round(sums.kw / sel.kw * 100) : 0;
    var maxIE = sel.maxIE || 64;
    var okLoad = loadPct >= 50 && loadPct <= 130;
    var okN = sums.n >= 1 && sums.n <= maxIE;
    var verdict, vcls;
    if (sums.n === 0) { verdict = 'Noch keine Inneneinheiten gewählt.'; vcls = ''; }
    else if (okLoad && okN) { verdict = '✓ Auslastung ' + loadPct + ' % (zulässig 50–130 %) · ' + sums.n + ' von max. ' + maxIE + ' Inneneinheiten.'; vcls = 'ok'; }
    else {
      verdict = '⚠ ';
      if (!okN) verdict += 'Anzahl Inneneinheiten überschreitet Maximum (' + sums.n + ' > ' + maxIE + '). ';
      if (!okLoad) verdict += 'Auslastung ' + loadPct + ' % außerhalb 50–130 % der Nennkühlleistung!';
      vcls = 'bad';
    }
    var cls = (sums.n > 0 && !(okLoad && okN)) ? 'bad' : '';
    return '<div class="check"><div class="check-inner"><div class="gauges">' +
      gauge('Auslastung', loadPct, 160, 50, 130, cls, ' %') +
      gauge('Inneneinheiten', sums.n, Math.max(maxIE + 4, 10), 1, maxIE, cls) +
      gauge('Angeschl. kW', sums.kw, Math.max(sel.kw * 1.6, 10), sel.kw * 0.5, sel.kw * 1.3, cls, ' kW') +
      '</div><div class="verdict ' + vcls + '">' + verdict + '</div></div></div>';
  }
  function vrfVerteilerFor(sel, n) {
    /* Einzelverteiler nach kW-Klasse; (n-1) Stück für n IE */
    var kw = sel.kw || 0;
    var art = kw <= 16 ? '2571363' : (kw <= 28 ? '2571717' : (kw <= 56 ? '2571718' : '2571719'));
    return { art: art, qty: Math.max(n - 1, 1) };
  }
  function addVrfSystem() {
    var sel = vrfOutById(state.vrfOutId);
    if (!sel) return;
    var sums = vrfSums();
    if (sums.n === 0) return;
    var loadPct = sel.kw ? Math.round(sums.kw / sel.kw * 100) : 0;
    var sub = sums.n + ' Inneneinheiten · ' + fmtKw(sums.kw) + ' · Auslastung ' + loadPct + ' %' +
      ((loadPct < 50 || loadPct > 130) ? ' – ⚠ außerhalb 50–130 %!' : '');
    var sugs = [], j, m;
    for (j = 0; j < D.vrfIn.length; j++) {
      m = D.vrfIn[j];
      var q = state.vrfSel[m.art] || 0;
      if (q > 0) sugs.push({ art: m.art, name: 'VRF-Inneneinheit ' + m.model + ' – ' + m.series + ' (' + fmtKw(m.kw) + ')', price: m.price, qty: q, on: true, why: m.gen });
    }
    /* Pflichtzubehör */
    if (sums.n > 1) {
      var vt = vrfVerteilerFor(sel, sums.n);
      sugs.push({ art: vt.art, name: accName(vt.art), price: accPrice(vt.art), qty: vt.qty, on: true, why: 'Pflicht: 1 Verteiler je Abzweig (' + sums.n + ' IE)' });
    }
    if (sel.wanne) sugs.push({ art: sel.wanne, name: accName(sel.wanne), price: accPrice(sel.wanne), qty: 1, on: true, why: 'Pflicht laut Vorgabe' });
    if (sel.reps) sugs.push({ art: sel.reps, name: accName(sel.reps), price: accPrice(sel.reps), qty: 1, on: true, why: 'Pflicht laut Vorgabe' });
    sugs.push({ art: '2563982', name: accName('2563982'), price: accPrice('2563982'), qty: 1, on: true, why: 'Pflicht: Bus-Kabel UTY-WMBUS' });
    var ls = linesForPipe(sel.pipe);
    for (j = 0; j < ls.length; j++) sugs.push({ art: ls[j].art, name: ls[j].name, price: ls[j].price, qty: 1, on: false, why: 'Hauptstrecke Ø ' + sel.pipe + ' mm' });
    openSuggestSheet('VRF-System übernehmen', sub,
      { art: sel.art, name: 'VRF-Außeneinheit ' + sel.model + ' – ' + sel.series + ' (' + fmtKw(sel.kw) + ')', price: sel.price, qty: 1 }, sugs);
  }

  /* ---------- ZUBEHÖR ---------- */
  function renderZub() {

  /* ---------- ANALYSE ---------- */
  var analyseText = '';
  var analyseSeries = 'Kompakt-Wandmodelle';
  function renderAnalyse() {
    var seriesOpts = ['Kompakt-Wandmodelle', 'Basic-Wandmodelle', 'Klassik-Wandmodelle', 'Premium-Wandmodelle', 'Deluxe-Wandmodelle', 'Design-Wandmodelle perlweiß', 'Euro-Kassettenmodelle', 'Slim-Zwischendeckenmodelle'];
    var html = '<div class="field"><label>Kundentext / E-Mail / Raumliste</label>' +
      '<textarea class="input" id="anText" placeholder="z. B.: Wohnzimmer 35 m², Schlafzimmer 18 qm, Büro 4 x 5 m … oder komplette Kunden-E-Mail einfügen">' + esc(analyseText) + '</textarea></div>' +
      '<div class="row2"><div class="field"><label>Bevorzugte Geräteserie</label><select class="input" id="anSeries">';
    var j;
    for (j = 0; j < seriesOpts.length; j++) {
      html += '<option' + (analyseSeries === seriesOpts[j] ? ' selected' : '') + '>' + seriesOpts[j] + '</option>';
    }
    html += '</select></div><div class="field"><label>&nbsp;</label><button class="btn primary" id="anRun" style="width:100%;padding:11px">Analysieren (100 W/m²)</button></div></div>' +
      '<div id="anResult"></div>';
    $('view').innerHTML = html;
    $('anText').oninput = function () { analyseText = this.value; };
    $('anSeries').onchange = function () { analyseSeries = this.value; };
    $('anRun').onclick = function () { runAnalyse(); };
    if (analyseText) runAnalyse();
  }
  function runAnalyse() {
    var t = analyseText || '';
    var rooms = [], j, m;
    /* "35 m²/qm" mit optionalem Raumnamen davor */
    var re1 = /([A-Za-zÄÖÜäöüß\-\/ ]{0,26}?)\s*(\d+(?:[\.,]\d+)?)\s*(?:m²|m2|qm|Quadratmeter)/g;
    while ((m = re1.exec(t)) !== null) {
      var name = (m[1] || '').replace(/^[\s,;:.\-–]+/, '').replace(/\b(ca|mit|und|hat|etwa|rund|je|ist|sind|von)\b\s*$/i, '').replace(/[\s:]+$/, '');
      rooms.push({ name: name || 'Raum ' + (rooms.length + 1), area: parseFloat(m[2].replace(',', '.')) });
    }
    /* "4 x 5 m" */
    var re2 = /(\d+(?:[\.,]\d+)?)\s*[x×]\s*(\d+(?:[\.,]\d+)?)\s*m\b/g;
    while ((m = re2.exec(t)) !== null) {
      var a = parseFloat(m[1].replace(',', '.')), b = parseFloat(m[2].replace(',', '.'));
      if (a > 1 && b > 1 && a < 60 && b < 60) rooms.push({ name: 'Raum ' + (rooms.length + 1) + ' (' + m[1] + '×' + m[2] + ' m)', area: Math.round(a * b * 10) / 10 });
    }
    /* Artikelnummern im Text */
    var artHits = [], seenA = {};
    var re3 = /2\d{6}/g;
    while ((m = re3.exec(t)) !== null) {
      var art = m[0];
      if (seenA[art]) continue; seenA[art] = 1;
      var hit = lookupArt(art);
      if (hit) artHits.push(hit);
    }
    /* Modellnennungen mit Menge: "2x ASEH 09KMCG" oder "09KMCG" */
    var modelHits = [], seenM = {};
    for (j = 0; j < D.singleSets.length; j++) {
      var s = D.singleSets[j];
      var code = s.indoorModel.split(' ').pop();
      if (seenM[code]) continue;
      var re4 = new RegExp('(?:(\\d+)\\s*[x×]\\s*)?(?:AS|AU|AR|AB|AG)?[A-Z]{0,2}\\s?' + code + '\\b');
      var mm = re4.exec(t);
      if (mm) { seenM[code] = 1; modelHits.push({ set: s, qty: mm[1] ? parseInt(mm[1], 10) : 1 }); }
    }

    var html = '';
    if (rooms.length === 0 && artHits.length === 0 && modelHits.length === 0) {
      html = '<div class="empty">Keine Raumgrößen, Artikelnummern oder Modellbezeichnungen erkannt.</div>';
      $('anResult').innerHTML = html; return;
    }
    var totalKw = 0;
    if (rooms.length > 0) {
      html += '<div class="section-title">Räume · 100 W/m²</div>';
      for (j = 0; j < rooms.length; j++) {
        var r = rooms[j];
        r.kw = Math.round(r.area * 0.1 * 10) / 10;
        totalKw += r.kw;
        var best = bestSetFor(r.kw, analyseSeries);
        r.best = best;
        html += '<div class="pickrow"><div class="info">' +
          '<div class="m">' + esc(r.name) + ' <span class="badge">' + String(r.area).replace('.', ',') + ' m² → ' + fmtKw(r.kw) + '</span></div>' +
          (best ? '<div class="s">Vorschlag: <b style="color:var(--frost)">' + esc(best.indoorModel) + '</b> (' + fmtKw(best.kw) + ') · Set <span class="art">' + esc(best.setArt) + '</span> · ' + fmtEurList(best.setPrice) + '</div>' : '<div class="s">Kein passendes Gerät in dieser Serie – größere Serie wählen.</div>') +
          '</div>' + (best ? '<button class="btn small primary" data-act="addSet" data-id="' + best.id + '">Set +</button>' : '') + '</div>';
      }
      totalKw = Math.round(totalKw * 10) / 10;
      html += '<div class="okbox">Gesamtbedarf: <b>' + fmtKw(totalKw) + '</b> über ' + rooms.length + ' Räume.</div>';
      /* Multi-Vorschlag bei 2–5 Räumen */
      if (rooms.length >= 2 && rooms.length <= 5) {
        var prop = proposeMulti(rooms);
        if (prop) {
          html += '<div class="section-title">Alternative: Multi-Split</div><div class="card">' +
            '<div class="head"><div class="sil">' + SIL.outdoor + '</div><div class="tt">' +
            '<div class="series">' + esc(prop.out.label) + '</div><div class="model">' + esc(prop.out.model) + '</div></div></div>' +
            '<div class="specs"><span>Indexsumme <b>' + prop.idx + '</b> (zul. ' + prop.out.idxMin + '–' + prop.out.idxMax + ')</span>' +
            '<span>kW <b>' + String(prop.kw).replace('.', ',') + '</b> (zul. ' + String(prop.out.kwMin).replace('.', ',') + '–' + String(prop.out.kwMax).replace('.', ',') + ')</span></div>' +
            '<div class="s" style="font-size:12.5px;color:var(--muted)">' + esc(prop.desc) + '</div>' +
            '<button class="btn primary" id="anMulti">Multi-Kombination in Konfigurator laden</button></div>';
        }
      }
    }
    if (modelHits.length > 0) {
      html += '<div class="section-title">Erkannte Geräte im Text</div>';
      for (j = 0; j < modelHits.length; j++) {
        var mh = modelHits[j];
        html += '<div class="pickrow"><div class="info"><div class="m">' + mh.qty + ' × ' + esc(mh.set.indoorModel) + '</div>' +
          '<div class="s">' + esc(mh.set.series) + ' · Set <span class="art">' + esc(mh.set.setArt) + '</span> · ' + fmtEurList(mh.set.setPrice) + '</div></div>' +
          '<button class="btn small primary" data-mhadd="' + mh.set.id + '|' + mh.qty + '">Set +</button></div>';
      }
    }
    if (artHits.length > 0) {
      html += '<div class="section-title">Erkannte Artikelnummern</div>';
      for (j = 0; j < artHits.length; j++) {
        var ah = artHits[j];
        html += '<div class="pickrow"><div class="info"><div class="m" style="font-size:13.5px">' + esc(ah.name) + '</div>' +
          '<div class="s"><span class="art">' + esc(ah.art) + '</span> · ' + fmtEurList(ah.price) + '</div></div>' +
          '<button class="btn small primary" data-ahadd="' + ah.art + '|' + esc(ah.name) + '|' + (ah.price || '') + '">+</button></div>';
      }
    }
    $('anResult').innerHTML = html;
    lastMultiProposal = null;
    if ($('anMulti')) {
      $('anMulti').onclick = function () {
        var prop = proposeMulti(rooms);
        if (!prop) return;
        state.multi = {};
        var k;
        for (k = 0; k < prop.sel.length; k++) state.multi[prop.sel[k].id] = (state.multi[prop.sel[k].id] || 0) + 1;
        store.set('multi', state.multi);
        state.tab = 'multi'; render(); window.scrollTo(0, 0);
      };
    }
    bindActions();
    var mha = $('anResult').querySelectorAll('[data-mhadd]');
    for (j = 0; j < mha.length; j++) mha[j].onclick = function () {
      var p = this.getAttribute('data-mhadd').split('|');
      var s = findSet(p[0]);
      if (s) { addToCart(s.setArt, 'Set ' + s.indoorModel + ' / ' + s.outdoorModel + ' – ' + s.series + ' (' + fmtKw(s.kw) + ')', s.setPrice, parseInt(p[1], 10)); toast('In den Warenkorb gelegt'); }
    };
    var aha = $('anResult').querySelectorAll('[data-ahadd]');
    for (j = 0; j < aha.length; j++) aha[j].onclick = function () {
      var p = this.getAttribute('data-ahadd').split('|');
      addToCart(p[0], p[1], p[2] ? parseInt(p[2], 10) : null, 1);
      toast('In den Warenkorb gelegt');
    };
  }
  var lastMultiProposal = null;
  function lookupArt(art) {
    var j;
    for (j = 0; j < D.singleSets.length; j++) {
      var s = D.singleSets[j];
      if (s.setArt === art) return { art: art, name: 'Set ' + s.indoorModel + ' / ' + s.outdoorModel + ' – ' + s.series, price: s.setPrice };
      if (s.indoorArt === art) return { art: art, name: 'Inneneinheit ' + s.indoorModel + ' – ' + s.series, price: s.indoorPrice };
      if (s.outdoorArt === art) return { art: art, name: 'Außeneinheit ' + s.outdoorModel, price: s.outdoorPrice };
    }
    for (j = 0; j < D.multiIn.length; j++) if (D.multiIn[j].art === art) { var m = D.multiIn[j]; return { art: art, name: 'Inneneinheit ' + m.model + ' – ' + m.series, price: m.price }; }
    for (j = 0; j < D.multiOut.length; j++) if (D.multiOut[j].art === art) { var o = D.multiOut[j]; return { art: art, name: 'Außeneinheit ' + o.model + ' – ' + o.label, price: o.price }; }
    for (j = 0; j < D.vrfOut.length; j++) if (D.vrfOut[j].art === art) { var vo = D.vrfOut[j]; return { art: art, name: 'VRF-Außeneinheit ' + vo.model + ' – ' + vo.series, price: vo.price }; }
    for (j = 0; j < D.vrfIn.length; j++) if (D.vrfIn[j].art === art) { var vi = D.vrfIn[j]; return { art: art, name: 'VRF-Inneneinheit ' + vi.model + ' – ' + vi.series, price: vi.price }; }
    for (j = 0; j < D.simOut.length; j++) if (D.simOut[j].art === art) { var so = D.simOut[j]; return { art: art, name: 'Außeneinheit ' + so.model + ' – Simultan Multi', price: so.price }; }
    for (j = 0; j < D.simIn.length; j++) if (D.simIn[j].art === art) { var si = D.simIn[j]; return { art: art, name: 'Inneneinheit ' + si.model + ' – ' + si.series + ' (Simultan)', price: si.price }; }
    if (accByArt[art]) return { art: art, name: accByArt[art].name, price: accByArt[art].price };
    return null;
  }
  function bestSetFor(kw, series) {
    var best = null, largest = null, j, s;
    for (j = 0; j < D.singleSets.length; j++) {
      s = D.singleSets[j];
      if (s.series.indexOf(series) !== 0) continue;
      if (s.kw === null) continue;
      if (!largest || s.kw > largest.kw) largest = s;
      if (s.kw >= kw && (!best || s.kw < best.kw)) best = s;
    }
    return best || largest;
  }
  function proposeMulti(rooms) {
    /* Pro Raum kleinste Multi-IE aus Kompakt-Wand (KMCG), die kW deckt */
    var sel = [], idx = 0, kw = 0, j, k;
    for (j = 0; j < rooms.length; j++) {
      var need = rooms[j].kw, pick = null;
      for (k = 0; k < D.multiIn.length; k++) {
        var m = D.multiIn[k];
        if (m.series !== 'Kompakt-Wandmodelle') continue;
        if (m.kw >= need && (!pick || m.kw < pick.kw)) pick = m;
      }
      if (!pick) {
        for (k = 0; k < D.multiIn.length; k++) {
          var m2 = D.multiIn[k];
          if (m2.series === 'Kompakt-Wandmodelle' && (!pick || m2.kw > pick.kw)) pick = m2;
        }
      }
      if (!pick) return null;
      sel.push(pick); idx += pick.index; kw += pick.kw;
    }
    kw = Math.round(kw * 10) / 10;
    var out = null;
    for (j = 0; j < D.multiOut.length; j++) {
      var o = D.multiOut[j];
      if (rooms.length >= o.minU && rooms.length <= o.maxU && idx >= o.idxMin && idx <= o.idxMax && kw >= o.kwMin && kw <= o.kwMax) { out = o; break; }
    }
    if (!out) return null;
    var names = [], c = {};
    for (j = 0; j < sel.length; j++) c[sel[j].model] = (c[sel[j].model] || 0) + 1;
    var mn;
    for (mn in c) if (c.hasOwnProperty(mn)) names.push(c[mn] + ' × ' + mn);
    return { out: out, sel: sel, idx: idx, kw: kw, desc: names.join(' + ') };
  }

  /* ---------- AUSGABE ---------- */

        '<div class="field"><label>Firma</label><input class="input" id="fFirma" value="' + esc(state.intern.firma) + '" placeholder="Firma des Kunden"></div>' +
        '<div class="row2"><div class="field"><label>Ansprechpartner</label><input class="input" id="fAp" value="' + esc(state.intern.ap) + '"></div>' +
        '<div class="field"><label>Kommission</label><input class="input" id="fKomm" value="' + esc(state.intern.komm) + '"></div></div>' +
        '<div class="field"><label>Rabatt % (nur wenn zugesagt)</label><input class="input" id="fRabatt" type="number" inputmode="decimal" value="' + esc(state.rabatt) + '" placeholder="leer lassen, wenn kein Rabatt"></div>';
    }

    /* Vorschau + Summen */
    var txt = buildOutput();
    html += '<div class="section-title">Vorschau</div><pre class="out" id="outPre">' + esc(txt) + '</pre>' +
      '<div class="cta-row" style="margin-top:10px">' +
      '<button class="btn primary" id="copyBtn" style="flex:1;padding:12px">Text kopieren</button>' +
      '<button class="btn" id="mailBtn">Als E-Mail</button></div>';
    html += sumBox();

    $('view').innerHTML = html;

    var v = $('view'), j2;
    var cm = v.querySelectorAll('[data-cm]');
    for (j2 = 0; j2 < cm.length; j2++) cm[j2].onclick = function () { cartStep(parseInt(this.getAttribute('data-cm'), 10), -1); };
    var cp = v.querySelectorAll('[data-cp]');
    for (j2 = 0; j2 < cp.length; j2++) cp[j2].onclick = function () { cartStep(parseInt(this.getAttribute('data-cp'), 10), 1); };
    var cx = v.querySelectorAll('[data-cx]');
    for (j2 = 0; j2 < cx.length; j2++) cx[j2].onclick = function () { state.cart.splice(parseInt(this.getAttribute('data-cx'), 10), 1); saveCart(); render(); };
    if ($('cartClear')) $('cartClear').onclick = function () { if (confirm('Warenkorb wirklich leeren?')) { state.cart = []; saveCart(); render(); } };
    var mo = v.querySelectorAll('[data-mo]');
    for (j2 = 0; j2 < mo.length; j2++) mo[j2].onclick = function () { state.mode = this.getAttribute('data-mo'); store.set('mode', state.mode); render(); };
    bindOutField('fRabatt', function (val) { state.rabatt = val; store.set('rabatt', val); });
    bindOutField('fRate', function (val) { state.monteur.rate = val; store.set('monteur', state.monteur); });
    bindOutField('fHours', function (val) { state.monteur.hours = val; store.set('monteur', state.monteur); });

  function bindOutField(id, fn) {

  function refreshOut() {

  function cartStep(i, d) {
    var it = state.cart[i];

  function cartSums() {
    var list = 0, j, monteur = 0;
    for (j = 0; j < state.cart.length; j++) if (state.cart[j].price) list += state.cart[j].price * state.cart[j].qty;
    var rab = parseFloat(String(state.rabatt).replace(',', '.'));
    if (isNaN(rab) || rab < 0) rab = 0;
    var rabatt = list * rab / 100;
    var netto = list - rabatt;
    var h = parseFloat(String(state.monteur.hours).replace(',', '.'));
    var r = parseFloat(String(state.monteur.rate).replace(',', '.'));
    if (!isNaN(h) && !isNaN(r) && h > 0) monteur = h * r;
    return { list: list, rab: rab, rabatt: rabatt, netto: netto, monteur: monteur, gesamt: netto + monteur };
  }
  function sumBox() {
    var s = cartSums();
    var html = '<div id="sumBox" style="margin-top:14px">';
    if (state.mode === 'angebot') {
      html += '<div class="sumline"><span>Listenpreis gesamt</span><span>' + fmtEur(s.list, true) + '</span></div>';
      if (s.rab > 0) {
        html += '<div class="sumline"><span>abzüglich ' + String(s.rab).replace('.', ',') + ' % Rabatt</span><span>−' + fmtEur(s.rabatt, true) + '</span></div>' +
          '<div class="sumline"><span>Nettopreis Material</span><span>' + fmtEur(s.netto, true) + '</span></div>';
      }
      if (s.monteur > 0) html += '<div class="sumline"><span>Monteurstunden</span><span>' + fmtEur(s.monteur, true) + '</span></div>';
      html += '<div class="sumline total"><span>Gesamt netto</span><span>' + fmtEur(s.gesamt, true) + '</span></div>';
    } else {
      html += '<div class="sumline total"><span>Listenpreis gesamt (netto)</span><span>' + fmtEur(s.list, true) + '</span></div>';
    }
    html += '</div>';
    return html;
  }
  function regionOptions() {
    var html = '', j;
    for (j = 0; j < state.regionalList.length; j++) {
      var r = state.regionalList[j];
      html += '<option value="' + esc(r.id) + '"' + (state.regional === r.id ? ' selected' : '') + '>' + esc(r.name) + '</option>';
    }
    return html;
  }
  function regionById(id) {
    var j;
    for (j = 0; j < state.regionalList.length; j++) if (state.regionalList[j].id === id) return state.regionalList[j];
    return state.regionalList[0];
  }
  function openRegionSheet() {
    var html = '<h3>Regionalcenter verwalten</h3><div class="sub">Eigene Standorte für die Angebots-Fußzeile anlegen.</div>';
    var j;
    for (j = 0; j < state.regionalList.length; j++) {
      var r = state.regionalList[j];
      html += '<div class="sug"><div class="info"><div class="n">' + esc(r.name) + '</div><div class="d">' + esc(r.strasse) + ', ' + esc(r.ort) + '</div></div>' +
        (j > 1 ? '<button class="btn small danger" data-rdel="' + j + '">✕</button>' : '') + '</div>';
    }
    html += '<div class="section-title" style="margin-top:14px">Neues Regionalcenter</div>' +
      '<div class="field"><input class="input" id="rN" placeholder="Name, z. B. Regionalcenter München"></div>' +
      '<div class="field"><input class="input" id="rS" placeholder="Straße und Hausnummer"></div>' +
      '<div class="field"><input class="input" id="rO" placeholder="PLZ und Ort"></div>' +
      '<div class="foot"><button class="btn" id="rClose">Schließen</button><button class="btn primary" id="rAdd">Hinzufügen</button></div>';
    openSheet(html);
    $('rClose').onclick = closeSheet;
    $('rAdd').onclick = function () {
      var n = $('rN').value, s2 = $('rS').value, o = $('rO').value;
      if (!n) return;
      state.regionalList.push({ id: 'rc' + (+new Date()), name: n, firma: 'General HVAC Solutions Deutschland GmbH', strasse: s2, ort: o, web: 'www.generalww.com/de' });
      store.set('regionalList', state.regionalList);
      openRegionSheet();
    };
    var dels = $('sheetHost').querySelectorAll('[data-rdel]');
    for (j = 0; j < dels.length; j++) dels[j].onclick = function () {
      state.regionalList.splice(parseInt(this.getAttribute('data-rdel'), 10), 1);
      store.set('regionalList', state.regionalList);
      openRegionSheet();
    };
  }

  function openSigSheet() {
    var html = '<h3>Signatur bearbeiten</h3><div class="sub">Erscheint in der Angebots-Fußzeile.</div>' +
      '<div class="field"><label>Name</label><input class="input" id="sgN" value="' + esc(state.sig.name) + '"></div>' +
      '<div class="field"><label>Telefon</label><input class="input" id="sgT" value="' + esc(state.sig.tel) + '"></div>' +
      '<div class="field"><label>E-Mail</label><input class="input" id="sgM" value="' + esc(state.sig.mail) + '"></div>' +
      '<div class="foot"><button class="btn" id="sgClose">Abbrechen</button><button class="btn primary" id="sgSave">Speichern</button></div>';
    openSheet(html);
    $('sgClose').onclick = closeSheet;
    $('sgSave').onclick = function () {
      state.sig = { name: $('sgN').value, tel: $('sgT').value, mail: $('sgM').value };
      store.set('sig', state.sig);
      closeSheet(); refreshOut(); toast('Signatur gespeichert');
    };
  }

  /* ---------- Textaufbau ---------- */
  function positionLines(withPrices) {
    var lines = [], j;
    for (j = 0; j < state.cart.length; j++) {
      var it = state.cart[j];
      var l = it.qty + ' x ' + it.art + ' – ' + it.name;
      if (withPrices && it.price) l += ' — à ' + fmtEur(it.price, true) + ' = ' + fmtEur(it.price * it.qty, true);
      lines.push(l);
    }
    return lines;
  }
  function buildOutput() {
    if (state.cart.length === 0) return 'Noch keine Positionen im Warenkorb.';
    var s = cartSums();
    var out = [];
    if (state.mode === 'bestell') {
      out = positionLines(false);
      return out.join('\n');
    }
    if (state.mode === 'intern') {
      if (state.intern.empf) {
        out.push('Hallo ' + state.intern.empf + ',');
        out.push('');
        out.push('bitte bestellen:');
        out.push('');
      }
      out.push('Firma: ' + (state.intern.firma || ''));
      out.push('Ansprechpartner: ' + (state.intern.ap || ''));
      out.push('Kommission: ' + (state.intern.komm || ''));
      out.push('');
      out = out.concat(positionLines(false));
      var rab = parseFloat(String(state.rabatt).replace(',', '.'));
      if (!isNaN(rab) && rab > 0) {
        out.push('');
        out.push('Rabatt: ' + String(rab).replace('.', ',') + ' %');
      }
      return out.join('\n');
    }
    /* Angebot */
    out = positionLines(true);
    out.push('');
    out.push('Listenpreis gesamt: ' + fmtEur(s.list, true));
    if (s.rab > 0) {
      out.push('abzüglich ' + String(s.rab).replace('.', ',') + ' % Rabatt: −' + fmtEur(s.rabatt, true));
      out.push('Nettopreis Material: ' + fmtEur(s.netto, true));
    }
    if (s.monteur > 0) {
      var h = String(state.monteur.hours).replace('.', ',');
      var r = String(state.monteur.rate).replace('.', ',');
      out.push('');
      out.push('Monteurstunden: ' + h + ' Std. à ' + r + ' € – ' + (state.monteur.desc || 'Montagearbeiten') + ': ' + fmtEur(s.monteur, true));
    }
    out.push('');
    out.push('Gesamtsumme netto: ' + fmtEur(s.gesamt, true));
    var rc = regionById(state.regional);
    out.push('');
    out.push('Mit freundlichen Grüßen');
    out.push(state.sig.name);
    out.push(rc.firma + ' · ' + rc.name);
    out.push(rc.strasse + ' · ' + rc.ort);
    out.push('Tel. ' + state.sig.tel + ' · ' + state.sig.mail);
    out.push(rc.web);
    return out.join('\n');
  }
  function copyOut() {
    var txt = buildOutput();
    var ta = document.createElement('textarea');
    ta.value = txt;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    ta.setSelectionRange(0, 999999);
    var ok = false;
    try { ok = document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
    if (!ok && navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt);
      ok = true;
    }
    toast(ok ? 'Text kopiert' : 'Kopieren nicht möglich – Text markieren');
  }
  function mailOut() {
    var subj = state.mode === 'intern' ? 'Bestellanforderung' + (state.intern.komm ? ' – ' + state.intern.komm : '') :
      (state.mode === 'angebot' ? 'Ihr Angebot – GENERAL Klimatechnik' : 'Bestellung');
    var body = buildOutput();
    var to = (state.mode === 'intern' && state.intern.mail) ? encodeURIComponent(state.intern.mail) : '';
    window.location.href = 'mailto:' + to + '?subject=' + encodeURIComponent(subj) + '&body=' + encodeURIComponent(body);
  }

  /* ---------- Render-Switch & Init ---------- */
  function render() {
    renderNav();
    renderCockpit();
    if (state.tab === 'single') renderSingle();
    else if (state.tab === 'multi') renderMulti();
    else if (state.tab === 'sim') renderSim();
    else if (state.tab === 'vrf') renderVrf();
    else if (state.tab === 'zub') renderZub();
    else if (state.tab === 'analyse') renderAnalyse();
    else if (state.tab === 'out') renderOut();
  }
  $('cartBtn').onclick = function () { state.tab = 'out'; render(); window.scrollTo(0, 0); };
  updateCartBadge(false);
  render();
})();
</script>
</body>
</html>
